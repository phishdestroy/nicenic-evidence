@keyframes sweep{0%{transform:translateY(-40px);opacity:0}15%{opacity:.7}85%{opacity:.7}100%{transform:translateY(300px);opacity:0}}
.scanline{animation:sweep 3.5s ease-in-out infinite}
@keyframes pulse{0%,100%{r:3;opacity:.9}50%{r:5.5;opacity:.4}}
@keyframes pulse2{0%,100%{r:2.5;opacity:.8}50%{r:4.5;opacity:.35}}
.p1{animation:pulse 2s ease-in-out infinite}
.p2{animation:pulse2 2.4s ease-in-out infinite .4s}
.p3{animation:pulse 2.8s ease-in-out infinite .8s}
.p4{animation:pulse2 2.2s ease-in-out infinite 1.2s}
.p5{animation:pulse 3s ease-in-out infinite .6s}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.s1{animation:fadein .6s ease both .1s}.s2{animation:fadein .6s ease both .4s}
.s3{animation:fadein .6s ease both .7s}.s4{animation:fadein .6s ease both 1s}
.s5{animation:fadein .6s ease both 1.3s}.s6{animation:fadein .6s ease both 1.6s}
@keyframes titlein{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.ta{animation:titlein .7s ease both .05s}.tb{animation:titlein .7s ease both .25s}
.tc{animation:fadein .6s ease both .5s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor{animation:blink 1s step-end infinite}
@keyframes arc{from{stroke-dashoffset:400}to{stroke-dashoffset:0}}
.a1{stroke-dasharray:400;animation:arc 2.2s ease both .3s}
.a2{stroke-dasharray:350;animation:arc 2.2s ease both .6s}
.a3{stroke-dasharray:300;animation:arc 2.2s ease both .9s}
.a4{stroke-dasharray:280;animation:arc 2.2s ease both .5s}
.a5{stroke-dasharray:260;animation:arc 2.2s ease both .8s}
.a6{stroke-dasharray:320;animation:arc 2.2s ease both 1.1s}
.a7{stroke-dasharray:290;animation:arc 2.2s ease both .4s}
@keyframes glw{0%,100%{filter:drop-shadow(0 0 6px #da3633)}50%{filter:drop-shadow(0 0 18px #da3633)}}
.origin{animation:glw 2.5s ease-in-out infinite}

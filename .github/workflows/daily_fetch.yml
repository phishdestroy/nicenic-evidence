name: Daily Fetch

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch new domains
        env:
          REGISTRAR_ID: "3765"
          NETAPI_TOKEN: ${{ secrets.NETAPI_TOKEN }}
        run: python scan/fetch_new.py

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/ stats/
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          COUNT=$(wc -l < data/new/2026/06/2026-06-20.txt 2>/dev/null || echo 0)
          git commit -m "daily fetch: 2026-06-20 — ${COUNT} new domains [skip ci]"
          for i in 1 2 3; do
            git pull --rebase -X theirs origin master && git push && exit 0
            sleep $((i * 5))
          done
          exit 1

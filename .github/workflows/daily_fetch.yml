name: Daily Fetch

on:
  schedule:
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Verify NETAPI_TOKEN secret
        env:
          NETAPI_TOKEN: ${{ secrets.NETAPI_TOKEN }}
        run: |
          if [ -z "$NETAPI_TOKEN" ]; then
            echo "::error::NETAPI_TOKEN secret is not configured for this repo"
            exit 1
          fi
          echo "✓ NETAPI_TOKEN present (${#NETAPI_TOKEN} chars)"

      - name: Fetch new domains
        env:
          REGISTRAR_ID: "3765"
          NETAPI_TOKEN: ${{ secrets.NETAPI_TOKEN }}
        run: python scan/fetch_new.py

      - name: Health check generated files
        run: |
          REQUIRED=(
            data/index.json
            stats/today.json
            stats/total.json
            stats/last_fetch.json
            stats/revenue.json
            stats/lifetime.json
          )
          MISSING=0
          for f in "${REQUIRED[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::warning::missing $f"
              MISSING=$((MISSING+1))
            else
              if ! python -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
                echo "::error::invalid JSON in $f"
                exit 1
              fi
            fi
          done
          echo "Generated stats/*.json files:"
          ls -la stats/ 2>/dev/null || true
          echo "Generated data/ioc/ files:"
          ls -la data/ioc/ 2>/dev/null || true
          echo "Monthly snapshot:"
          ls -la data/snapshots/ 2>/dev/null || true
          if [ "$MISSING" -gt 3 ]; then
            echo "::error::too many missing files ($MISSING) — fetch likely failed"
            exit 1
          fi


      - name: Rebuild dashboard data
        run: |
          if [ -f data/enriched.csv ]; then
            python docs/build_datajson.py
          fi

      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
                    git add data/ stats/ ioc/ docs/ README.md
          git add -u
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          AFTER=$(wc -l < data/all.txt 2>/dev/null || echo 0)
          NEW_COUNT=$(comm -13 <(git show HEAD:data/all.txt 2>/dev/null || true) data/all.txt 2>/dev/null | wc -l || echo 0)
          LATEST=$(ls data/new/$(date -u +%Y)/$(date -u +%m)/*.txt 2>/dev/null | tail -1 | xargs -I{} basename {} .txt || echo "unknown")
          git commit -m "daily fetch: $(date -u +%Y-%m-%d) — +${NEW_COUNT} new | latest: ${LATEST} | total: ${AFTER} [skip ci]"
          git push || (git pull --rebase -X theirs origin master && git push)

      - name: Mirror to Codeberg
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          if [ -z "$CODEBERG_TOKEN" ]; then echo "No CODEBERG_TOKEN, skip mirror"; exit 0; fi
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          BRANCH="${GITHUB_REF_NAME}"
          git remote add codeberg https://phishdestroy:${CODEBERG_TOKEN}@codeberg.org/phishdestroy/${REPO_NAME}.git 2>/dev/null ||             git remote set-url codeberg https://phishdestroy:${CODEBERG_TOKEN}@codeberg.org/phishdestroy/${REPO_NAME}.git
          if git ls-remote codeberg HEAD 2>/dev/null | grep -q HEAD; then
            echo "Codeberg has history, shallow push"
            git push codeberg HEAD:${BRANCH} --force || echo "Mirror push failed, continuing"
          else
            echo "Codeberg empty, unshallow first push"
            git fetch --unshallow 2>/dev/null || true
            git push codeberg HEAD:${BRANCH} --force || echo "Mirror push failed, continuing"
          fi

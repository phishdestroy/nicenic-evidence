name: Daily New Domains — NiceNIC

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch new domains
        env:
          NETAPI_TOKEN: ${{ secrets.NETAPI_TOKEN }}
          REGISTRAR_ID: "3765"
        run: python3 scan/fetch_new.py

      - name: Commit and push
        run: |
          git config user.name  "PhishDestroy Bot"
          git config user.email "bot@phishdestroy.io"
          git add data/ stats/
          git diff --cached --quiet && echo "Nothing new today." && exit 0
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(wc -l < data/new/${TODAY:0:4}/${TODAY:5:2}/$TODAY.txt 2>/dev/null || echo 0)
          git commit --no-gpg-sign -m "daily: $TODAY — ${COUNT} new domains (NiceNIC)"
          git push

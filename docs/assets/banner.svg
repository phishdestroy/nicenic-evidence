<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360">
<defs><style>
.bg{fill:#030810}.grid{stroke:#0d1f35;stroke-width:.8;fill:none}
.title{font-family:"Segoe UI",system-ui,sans-serif;font-weight:700;fill:#f0f6fc;letter-spacing:-.5px}
